<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vedpathi</title>

<style>
/* --- Modern CSS Variables --- */
:root {
    --primary: #6366f1; /* Modern Indigo */
    --primary-hover: #4f46e5;
    --bg-light: #f8fafc;
    --card-light: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --accent: #f59e0b;
    --glass: rgba(255, 255, 255, 0.7);
    --border: #e2e8f0;
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
}

/* --- Base Styles --- */
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-light);
    color: var(--text-main);
    margin: 0;
    padding: 20px;
    line-height: 1.6;
    transition: background 0.3s ease, color 0.3s ease;
}

.container {
    max-width: 850px;
    margin: 40px auto;
}

/* --- Header & Top Controls --- */
.header {
    text-align: center;
    margin-bottom: 40px;
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

h1 {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.025em;
    margin-bottom: 8px;
    background: linear-gradient(to right, #6366f1, #a855f7);
    background-clip: text; /* Standard */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h3 {
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 0;
}

/* --- Buttons (Gen Z / SaaS Style) --- */
button {
    font-family: inherit;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.controls button, .nav-buttons button, .header > button, .search-box button {
    background: var(--primary);
    color: white;
    box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5);
    filter: brightness(1.1);
}

button:active {
    transform: translateY(0);
}

/* --- Search Box --- */
.search-box {
    margin: 25px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
}

.search-box input {
    padding: 12px 20px;
    width: 300px;
    border-radius: 14px;
    border: 1px solid var(--border);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
}

.search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
}

/* --- The Main Page (The "Book" View) --- */
.page {
    background: var(--card-light);
    padding: 50px;
    border-radius: 32px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
}

.page-header h2 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 5px;
}

.page-header hr, .page-footer hr {
    border: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
    margin: 20px 0;
}

/* --- Verses --- */
.verse {
    margin-bottom: 30px;
    padding: 20px;
    border-radius: 16px;
    transition: background 0.2s;
}

.verse:hover {
    background: rgba(99, 102, 241, 0.04);
}

.sanskrit {
    font-size: 22px;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 12px;
    line-height: 1.5;
}

.translation {
    font-size: 18px;
    color: var(--text-main);
    border-left: 3px solid var(--border);
    padding-left: 20px;
}

.highlight {
    background: #fef3c7 !important;
    border-radius: 12px;
    animation: highlightFade 3s ease forwards;
}

@keyframes highlightFade {
    0% { background: #fde68a; }
    100% { background: transparent; }
}

/* --- Navigation & Footer --- */
.nav-buttons {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
}

.page-footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
}

/* --- Dark Mode Overrides --- */
body.dark {
    --bg-light: #0f172a;
    --card-light: #1e293b;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --glass: rgba(30, 41, 59, 0.7);
    --border: #334155;
    --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
}

body.dark .search-box input {
    background: #1e293b;
    color: white;
    border-color: #334155;
}

body.dark .verse:hover {
    background: rgba(255, 255, 255, 0.05);
}

/* Mobile Responsiveness */
@media (max-width: 600px) {
    .container { padding: 10px; }
    .page { padding: 25px; }
    .search-box { flex-direction: column; align-items: center; }
    .search-box input { width: 100%; }
}

/* To make it fully interactive, you can add this hover effect to your CSS block */
button[onclick="goToLibrary()"]:hover {
        transform: translateY(-2px);
        background: #4f46e5;
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5);
    }


/* 📱 Mobile Responsive */
@media (max-width: 600px){

.page{
    margin:10px;
    padding:20px 15px;
}

.sanskrit{
    font-size:16px;
}

.translation{
    font-size:14px;
}

.controls button,
.nav-buttons button,
button{
    width:100%;
    margin:5px 0;
}

}



</style>

</head>

<body>

    <div class="container">

        <div class="header">

            <button onclick="goToLibrary()" style="
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #6366f1; /* Modern Indigo */
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        ">
            🏠 Library
        </button>
        
        <button onclick="goToIndex()">
        📑 अनुक्रमणिका
        </button>
        
        <h1 id="book_title"></h1>
        <h3 id="section_title"></h3>
        
        <div class="controls">
        <button onclick="loadLanguage('mr')">Marathi</button>
        <button onclick="loadLanguage('hi')">Hindi</button>
        <button onclick="loadLanguage('sa')">Sanskrit</button>
        </div>

        <button onclick="toggleDarkMode()" style="background: #334155; margin-top: 15px;">
        🌙 Toggle Theme
        </button>

        <div style="margin-top:15px; display: flex; justify-content: center; gap: 10px;">
            <button onclick="changeFontSize(1)" style="background: var(--border); color: var(--text-main);">A+</button>
            <button onclick="changeFontSize(-1)" style="background: var(--border); color: var(--text-main);">A-</button>
        </div>
        
        <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Sanskrit verse...">
        <button onclick="searchVerse()">Search</button>
        </div>
        
        <div id="searchResults"></div>
        
        </div>



        <div class="page">

            <div class="page-header">
                <h2 id="book_title"></h2>
                <h4 id="section_title"></h4>
                <hr>
            </div>
        
            <div id="verses"></div>
        
            <div class="page-footer">
                <hr>
                <p>॥ समाप्त ॥</p>
                <p id="pageNumber">Page 1</p>
            </div>
        
        </div>
        
        <div class="nav-buttons">
            <button onclick="previousChapter()">◀ Previous Adhyay</button>
            <button onclick="nextChapter()">Next Adhyay ▶</button>
        </div>

<script>
// Logic remains identical to your original code
let currentFontSize = parseInt(localStorage.getItem("fontSize")) || 18;
    const urlParams = new URLSearchParams(window.location.search);
    const sectionId = urlParams.get("section_id") || 1;
    
    async function loadLanguage(lang){
    
    const response = await fetch(`https://vedpathi.onrender.com/sections/full/${sectionId}?language_code=${lang}`);
    const data = await response.json();
    
    document.getElementById("book_title").innerText = data.book_title;
    document.getElementById("section_title").innerText = data.section_title;
    
    const container = document.getElementById("verses");
    container.innerHTML = "";
    
    data.verses.forEach(v => {
        const verseDiv = document.createElement("div");
        verseDiv.className = "verse";
        verseDiv.id = `verse-${v.verse_number}`;
        verseDiv.innerHTML = `
        <div class="sanskrit">${v.verse_number}. ${v.sanskrit_text}</div>
        <div class="translation">${v.translation ?? ""}</div>
        `;
        container.appendChild(verseDiv);
    });

    const hash = window.location.hash;
    if(hash){
        const target = document.querySelector(hash);
        if(target){
            target.classList.add("highlight");
            target.scrollIntoView({ behavior: "smooth", block: "center" });
            setTimeout(() => {
                target.classList.remove("highlight");
            }, 3000);
        }
    }
    applyFontSize();
    }
    
    loadLanguage("mr");

    function previousChapter(){
        let prev = parseInt(sectionId) - 1;
        if(prev >= 1){ window.location.href = `index.html?section_id=${prev}`; }
    }

    function nextChapter(){
        let next = parseInt(sectionId) + 1;
        window.location.href = `index.html?section_id=${next}`;
    }

    async function searchVerse(){
        const query = document.getElementById("searchInput").value;
        if(!query){ alert("Please enter a word to search"); return; }
        const response = await fetch(`http://127.0.0.1:8000/verses/search?query=${query}`);
        const results = await response.json();
        let html = "<h3>Search Results</h3>";
        if(results.length === 0){ html += "<p>No results found</p>"; }
        results.forEach(v => {
            html += `
            <div style="margin-bottom:15px; cursor:pointer; padding: 10px; border-bottom: 1px solid var(--border);"
            onclick="openVerse(${v.verse_number})">
            <b>${v.book_title}</b> - ${v.section_title} (Verse ${v.verse_number})<br>
            ${v.sanskrit_text}
            </div>
            `;
        });
        document.getElementById("searchResults").innerHTML = html;
    }

    function openVerse(verseNumber){
        window.location.href = `index.html?section_id=1#verse-${verseNumber}`;
    }
    
    function goToIndex(){
        window.location.href = `chapters.html?book_id=1`;
    }

    window.addEventListener("hashchange", () => {
        loadLanguage("mr");
    });

    function changeFontSize(step){
        currentFontSize += step;
        localStorage.setItem("fontSize", currentFontSize);
        applyFontSize();
    }

    function applyFontSize(){
        document.querySelectorAll(".verse").forEach(v => {
            v.style.fontSize = currentFontSize + "px";
        });
        document.querySelectorAll(".sanskrit, .translation").forEach(el => {
            el.style.fontSize = currentFontSize + "px";
        });
    }

    function toggleDarkMode(){
        document.body.classList.toggle("dark");
        if(document.body.classList.contains("dark")){
            localStorage.setItem("theme", "dark");
        }else{
            localStorage.setItem("theme", "light");
        }
    }

    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark");
    }

    function goToLibrary(){
window.location.href = "library.html";
}
</script>

</body>
</html>
