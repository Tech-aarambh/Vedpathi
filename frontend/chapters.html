<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vedpathi Chapters</title>

<style>
/* --- Modern CSS Variables (Matching index.html) --- */
:root {
    --primary: #6366f1; 
    --primary-hover: #4f46e5;
    --bg-light: #f8fafc;
    --card-light: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --accent: #f59e0b;
    --glass: rgba(255, 255, 255, 0.7);
    --border: #e2e8f0;
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
}

/* --- Base Styles --- */
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-light);
    color: var(--text-main);
    margin: 0;
    padding: 20px;
    line-height: 1.6;
    transition: background 0.3s ease, color 0.3s ease;
}

.container {
    max-width: 850px;
    margin: 40px auto;
}

/* --- Header Section (Matching index.html) --- */
#book_title {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.025em;
    margin-bottom: 8px;
    background: linear-gradient(to right, #6366f1, #a855f7);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h3 {
    text-align: center;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 0;
    margin-bottom: 40px;
}

/* --- Chapter List Container --- */
#chapters {
    background: var(--card-light);
    padding: 30px;
    border-radius: 32px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
}

/* --- Chapter Items --- */
.chapter {
    background: transparent;
    padding: 18px 25px;
    margin-bottom: 10px;
    border-radius: 16px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s ease;
}

.chapter:hover {
    background: rgba(99, 102, 241, 0.05);
    border-color: var(--border);
    transform: translateX(5px);
}

.chapter span {
    font-size: 18px;
    font-weight: 500;
}

.chapter .arrow {
    color: var(--primary);
    font-weight: 800;
}

/* --- Dark Mode Overrides (Matching index.html) --- */
body.dark {
    --bg-light: #0f172a;
    --card-light: #1e293b;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --glass: rgba(30, 41, 59, 0.7);
    --border: #334155;
    --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
}

body.dark .chapter:hover {
    background: rgba(255, 255, 255, 0.05);
}

/* Mobile Responsiveness */
@media (max-width: 600px) {
    .container { padding: 10px; }
    #chapters { padding: 15px; }
}

/* To make it fully interactive, you can add this hover effect to your CSS block */
button[onclick="goToLibrary()"]:hover {
        transform: translateY(-2px);
        background: #4f46e5;
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5);
    }


</style>

</head>

<body>

<div class="container">

    <button onclick="goToLibrary()" style="
    margin-bottom: 20px;
    padding: 10px 20px;
    background: #6366f1; /* Modern Indigo */
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
    display: inline-flex;
    align-items: center;
    gap: 8px;
">
    🏠 Library
</button>

    <h1 id="book_title"></h1>
    <h3>📑 अनुक्रमणिका</h3>

    <div id="chapters"></div>

</div>

<script>
// Logic remains identical to your original code
function getQueryParam(param){
const urlParams = new URLSearchParams(window.location.search);
return urlParams.get(param);
}

const bookId = getQueryParam("book_id");

async function loadChapters(){

const response = await fetch(`https://vedpathi.onrender.com/sections/by-book/${bookId}`);
const chapters = await response.json();

const container = document.getElementById("chapters");

chapters.forEach(ch => {

const div = document.createElement("div");
div.className = "chapter";

div.innerHTML = `
<div style="display:flex; justify-content:space-between; align-items:center;">
<span>${ch.order_number}. ${ch.title}</span>
<span class="arrow">→</span>
</div>
`;

div.onclick = () => {
window.location.href = `index.html?section_id=${ch.id}`;
};

container.appendChild(div);

});

}

async function loadBookTitle(){

const response = await fetch("http://127.0.0.1:8000/books/");
const books = await response.json();

const book = books.find(b => b.id == bookId);

if(book){
document.getElementById("book_title").innerText = book.title;
}

}

// Sync dark mode theme from localStorage
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

loadChapters();
loadBookTitle();

function goToLibrary(){
window.location.href = "library.html";
}

</script>

</body>
</html>
