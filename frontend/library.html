<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedpathi Library</title>

<style>
:root {
    --primary: #6366f1; 
    --primary-hover: #4f46e5;
    --bg-light: #f8fafc;
    --card-light: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --accent: #f59e0b;
    --border: #e2e8f0;
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-light);
    color: var(--text-main);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 850px;
    margin: 40px auto;
}

h1 {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 30px;
}

/* ✅ GRID LAYOUT */
#books {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

/* ✅ CARD UI */
.book-card {
    background: var(--card-light);
    border-radius: 16px;
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: 0.3s;
}

.book-card:hover {
    transform: translateY(-5px);
}

/* ✅ IMAGE */
.book-img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* ✅ TEXT */
.book-card h3 {
    font-size: 1rem;
    margin: 5px 0;
}

.book-card p {
    font-size: 0.85rem;
    color: var(--text-muted);
}

/* MOBILE */
@media (max-width: 600px) {
    #books {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="container">
    <h1>📚 Vedpathi Library</h1>
    <div id="books"></div>
</div>

<script>

async function loadBooks(){

const response = await fetch("https://vedpathi.onrender.com/books/");
const books = await response.json();

const container = document.getElementById("books");

container.innerHTML = "";

books.forEach(book => {

const div = document.createElement("div");
div.className = "book-card";

div.innerHTML = `
<img src="https://via.placeholder.com/150" class="book-img">
<h3>${book.title}</h3>
<p>${book.description ?? ""}</p>
`;

div.onclick = () => {
window.location.href = `chapters.html?book_id=${book.id}`;
};

container.appendChild(div);

});

}

loadBooks();

</script>

</body>
</html>
