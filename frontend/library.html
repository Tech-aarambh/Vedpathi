<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vedpathi Library</title>

<style>
/* --- Modern CSS Variables (Matching index.html) --- */
:root {
    --primary: #6366f1; 
    --primary-hover: #4f46e5;
    --bg-light: #f8fafc;
    --card-light: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --accent: #f59e0b;
    --glass: rgba(255, 255, 255, 0.7);
    --border: #e2e8f0;
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
}

/* --- Base Styles --- */
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-light);
    color: var(--text-main);
    margin: 0;
    padding: 20px;
    line-height: 1.6;
    transition: background 0.3s ease, color 0.3s ease;
}

.container {
    max-width: 850px;
    margin: 40px auto;
}

/* --- Library Header (Fixed for Emoji) --- */
h1 {
    text-align: center;
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -0.025em;
    margin-bottom: 40px;
    display: flex; /* Added to center the emoji and text perfectly */
    justify-content: center;
    align-items: center;
    gap: 15px;
    color: var(--text-main); /* Fallback color */
}

h1 span {
    background: linear-gradient(to right, #6366f1, #a855f7);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* --- Book Card Styling --- */
#books {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.book {
    background: var(--card-light);
    padding: 30px;
    border-radius: 24px; /* Matching the SaaS aesthetic */
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.3s ease;
}

.book:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
    box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.1);
    background: rgba(99, 102, 241, 0.02);
}

.book h2 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--primary);
    margin-top: 0;
    margin-bottom: 10px;
}

.book p {
    color: var(--text-muted);
    font-size: 1.1rem;
    margin-bottom: 0;
}

/* --- Dark Mode Overrides (Matching index.html) --- */
body.dark {
    --bg-light: #0f172a;
    --card-light: #1e293b;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --glass: rgba(30, 41, 59, 0.7);
    --border: #334155;
    --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
}

body.dark .book:hover {
    background: rgba(255, 255, 255, 0.05);
}

/* Mobile Responsiveness */
@media (max-width: 600px) {
    .container { padding: 10px; }
    .book { padding: 20px; }
    h1 { font-size: 2.2rem; }
}
</style>

</head>

<body>

<div class="container">

    <h1>📚 <span>Vedpathi Library</span></h1>

<div id="books"></div>

</div>

<script>
// Logic remains identical to your original code
async function loadBooks(){

const response = await fetch("https://vedpathi.onrender.com/books/");
const books = await response.json();

const container = document.getElementById("books");

books.forEach(book => {

const div = document.createElement("div");
div.className = "book";

div.innerHTML = `
<h2>${book.title}</h2>
<p>${book.description ?? ""}</p>
`;

div.onclick = () => {
window.location.href = `chapters.html?book_id=${book.id}`;
};

container.appendChild(div);

});

}

// Sync dark mode theme from localStorage if user set it on index.html
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

loadBooks();

</script>

</body>
</html>
